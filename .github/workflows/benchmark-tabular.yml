name: Run AutoMLBenchmark for FEDOT

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        default: '3.9'
      os:
        description: 'Runner OS'
        default: 'ubuntu-latest'
      fedot_branch:
        description: 'FEDOT branch to test'
        default: 'master'
      preset:
        description: 'Benchmark preset (small, medium, large)'
        default: 'small'
      constraints:
        description: 'Resource constraints (e.g. 1h8c)'
        default: '1h8c'
      test_timeout:
        description: 'Test timeout in minutes'
        default: '120'

env:
  FEDOT_REPO: 'https://github.com/aimclub/FEDOT.git'
  BENCHMARK_DIR: 'automlbenchmark'

jobs:
  run_benchmark:
    timeout-minutes: ${{ inputs.test_timeout }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout AutoMLBenchmark
        uses: actions/checkout@v4
        with:
          repository: openml/automlbenchmark
          path: ${{ env.BENCHMARK_DIR }}
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install AutoMLBenchmark dependencies
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare FEDOT framework
        run: |
          cd ${{ env.BENCHMARK_DIR }}/frameworks
          mkdir -p FEDOT
          cd FEDOT
          
          echo "Creating virtual environment..."
          python -m venv venv
          source venv/bin/activate
          
          echo "Updating pip and setuptools..."
          pip install --upgrade pip setuptools wheel
          
          echo "Installing FEDOT from branch ${{ inputs.fedot_branch }}..."
          pip install git+${{ env.FEDOT_REPO }}@${{ inputs.fedot_branch }}
          
          echo "Verifying installation..."
          pip list | grep fedot
          python -c "import fedot; print(f'FEDOT version: {fedot.__version__}')"
          
          echo "Creating setup.sh..."
          cat > setup.sh << 'EOF'
          #!/bin/bash
          source venv/bin/activate
          EOF
          chmod +x setup.sh

      - name: Run benchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python runbenchmark.py FEDOT ${{ inputs.preset }} -t ${{ inputs.constraints }}
        env:
          GITHUB_PAT: ${{ secrets.PUBLIC_ACCESS_GITHUB_PAT }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: fedot-benchmark-results
          path: ${{ env.BENCHMARK_DIR }}/results/
          retention-days: 7
