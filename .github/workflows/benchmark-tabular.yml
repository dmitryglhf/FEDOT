name: Run AutoMLBenchmark for FEDOT

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version (3.8, 3.9, 3.10)'
        default: '3.9'
      os:
        description: 'Runner OS (ubuntu-latest, macos-latest, windows-latest)'
        default: 'ubuntu-latest'
      fedot_branch:
        description: 'FEDOT branch/tag/commit (e.g. master, develop, 0.7.5)'
        default: 'master'

env:
  BENCHMARK_DIR: 'automlbenchmark'

jobs:
  run_benchmark:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout AutoMLBenchmark
        uses: actions/checkout@v4
        with:
          repository: openml/automlbenchmark
          path: ${{ env.BENCHMARK_DIR }}
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install AutoMLBenchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare FEDOT framework
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          
          # Create FEDOT framework directory
          mkdir -p frameworks/FEDOT
          cd frameworks/FEDOT
          
          # Create setup.sh with automatic venv creation
          cat > setup.sh << 'EOF'
          #!/usr/bin/env bash
          HERE=$(dirname "$0")
          
          # Create virtual environment if not exists
          if [ ! -d "venv" ]; then
              echo "Creating virtual environment..."
              python -m venv venv
          fi
          
          # Activate and set up environment
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          
          # Install FEDOT from specified source
          if [[ "$1" == "stable" ]]; then
              pip install fedot
          else
              pip install git+https://github.com/aimclub/FEDOT.git@$1
          fi
          
          # Verify installation
          python -c "import fedot; print(f'\nFEDOT successfully installed\nVersion: {fedot.__version__}\n')"
          EOF
          
          chmod +x setup.sh
          ./setup.sh ${{ inputs.fedot_branch }}

      - name: Run benchmark (default settings)
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          echo "Starting benchmark with default settings (no constraints)"
          python runbenchmark.py FEDOT
        env:
          GITHUB_PAT: ${{ secrets.PUBLIC_ACCESS_GITHUB_PAT }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedot-results-${{ github.run_id }}
          path: ${{ env.BENCHMARK_DIR }}/results/
          retention-days: 7
