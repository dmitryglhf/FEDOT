name: Run AutoMLBenchmark for FEDOT

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        default: '3.9'
      os:
        description: 'Runner OS'
        default: 'ubuntu-latest'
      fedot_branch:
        description: 'FEDOT branch to test'
        default: 'master'
      preset:
        description: 'Benchmark preset (small, medium, large)'
        default: 'test'
      constraints:
        description: 'Resource constraints (e.g. 1h8c)'
        default: ''

jobs:
  run_benchmark:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout AutoMLBenchmark
        uses: actions/checkout@v3
        with:
          repository: openml/automlbenchmark
          path: automlbenchmark

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install AutoMLBenchmark dependencies
        run: |
          cd automlbenchmark
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare FEDOT framework directory
        run: |
          cd automlbenchmark/frameworks
          mkdir -p FEDOT
          cd FEDOT
          # Create dedicated venv for FEDOT
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          
          # Install FEDOT from specified branch
          pip install git+https://github.com/aimclub/FEDOT.git@${{ inputs.fedot_branch }}
          
          # Verify FEDOT installation
          pip list | grep fedot
          python -c "import fedot; print(f'FEDOT version: {fedot.__version__}')"
          
          # Create minimal setup.sh for AutoMLBenchmark
          echo '#!/bin/bash' > setup.sh
          echo 'source venv/bin/activate' >> setup.sh
          chmod +x setup.sh

      - name: Run benchmark
        run: |
          cd automlbenchmark
          python runbenchmark.py FEDOT ${{ inputs.preset }} -t ${{ inputs.constraints }}
        env:
          GITHUB_PAT: ${{ secrets.PUBLIC_ACCESS_GITHUB_PAT }}

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: automlbenchmark/results/
