name: Run AutoMLBenchmark for FEDOT

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        default: '3.9'
      os:
        description: 'Runner OS'
        default: 'ubuntu-latest'
      fedot_branch:
        description: 'FEDOT branch/tag/commit (e.g. master, develop, #a1b2c3d)'
        default: 'master'
      preset:
        description: 'Benchmark preset'
        default: 'small'
      constraints:
        description: 'Resource constraints (e.g. 1h8c)'
        default: '1h8c'

env:
  BENCHMARK_DIR: 'automlbenchmark'

jobs:
  run_benchmark:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout AutoMLBenchmark
        uses: actions/checkout@v4
        with:
          repository: openml/automlbenchmark
          path: ${{ env.BENCHMARK_DIR }}
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install AutoMLBenchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare FEDOT
        run: |
          cd ${{ env.BENCHMARK_DIR }}/frameworks/FEDOT
          
          # Force branch selection
          if [[ "${{ inputs.fedot_branch }}" == "stable" ]]; then
            echo "Using stable release from PyPI"
          else
            echo "Overriding FEDOT version to ${{ inputs.fedot_branch }}"
            sed -i "s|VERSION=.*|VERSION='${{ inputs.fedot_branch }}'|" setup.sh
            sed -i "s|REPO=.*|REPO='https://github.com/aimclub/FEDOT.git'|" setup.sh
          fi
          
          # Show modified setup.sh for debug
          cat setup.sh
          chmod +x setup.sh

      - name: Run benchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python runbenchmark.py FEDOT ${{ inputs.preset }} -t ${{ inputs.constraints }}
        env:
          GITHUB_PAT: ${{ secrets.PUBLIC_ACCESS_GITHUB_PAT }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fedot-results-${{ github.run_id }}
          path: ${{ env.BENCHMARK_DIR }}/results/
          retention-days: 7
