name: Run AutoMLBenchmark

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        default: '3.9'
      os:
        description: 'Runner OS'
        default: 'ubuntu-latest'
      fedot_branch:
        description: 'Branch to test'
        default: 'master'

env:
  FEDOT_REPO: 'https://github.com/aimclub/FEDOT.git'
  BENCHMARK_DIR: 'automlbenchmark'

jobs:
  run_benchmark:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout AutoMLBenchmark
        uses: actions/checkout@v4
        with:
          repository: openml/automlbenchmark
          path: ${{ env.BENCHMARK_DIR }}
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Specify FEDOT branch
        run: |
          cd ${{ env.BENCHMARK_DIR }}/frameworks/FEDOT
          if [[ "${{ inputs.fedot_branch }}" == "stable" || "${{ inputs.fedot_branch }}" == "latest" ]]; then
            sed -i "s/^VERSION=.*$/VERSION=\"${{ inputs.fedot_branch }}\"/" setup.sh
          else
            sed -i "s/^VERSION=.*$/VERSION='${{ inputs.fedot_branch }}'/" setup.sh
          fi
          echo "Set FEDOT branch to: ${{ inputs.fedot_branch }}"

      - name: Install AutoMLBenchmark dependencies
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run benchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python runbenchmark.py FEDOT
        env:
          GITHUB_PAT: ${{ secrets.PUBLIC_ACCESS_GITHUB_PAT }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: fedot-benchmark-results-${{ github.run_id }}
          path: ${{ env.BENCHMARK_DIR }}/results/
          retention-days: 7
