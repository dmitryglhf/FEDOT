name: Run AutoMLBenchmark for FEDOT

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        default: '3.9'
      os:
        description: 'Runner OS'
        default: 'ubuntu-latest'
      fedot_branch:
        description: 'FEDOT branch/tag/commit'
        default: 'master'
      preset:
        description: 'Benchmark preset'
        default: 'small'
      constraints:
        description: 'Resource constraints'
        default: '1h8c'

env:
  BENCHMARK_DIR: 'automlbenchmark'

jobs:
  run_benchmark:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout AutoMLBenchmark
        uses: actions/checkout@v4
        with:
          repository: openml/automlbenchmark
          path: ${{ env.BENCHMARK_DIR }}
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install AutoMLBenchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare FEDOT framework
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          
          # Создаем структуру каталогов для FEDOT
          mkdir -p frameworks/FEDOT
          cd frameworks/FEDOT
          
          # Создаем новый setup.sh с полной логикой
          cat > setup.sh << 'EOF'
          #!/usr/bin/env bash
          HERE=$(dirname "$0")
          
          # Создаем venv если его нет
          if [ ! -d "venv" ]; then
              echo "Creating virtual environment..."
              python -m venv venv
          fi
          
          # Активируем venv
          source venv/bin/activate
          
          # Устанавливаем выбранную версию FEDOT
          pip install --upgrade pip
          if [[ "$1" == "stable" ]]; then
              pip install fedot
          else
              pip install git+https://github.com/aimclub/FEDOT.git@$1
          fi
          
          # Проверяем установку
          pip list | grep fedot
          python -c "import fedot; print(f'FEDOT version: {fedot.__version__}')"
          EOF
          
          # Делаем скрипт исполняемым
          chmod +x setup.sh
          
          # Запускаем setup.sh с указанной веткой
          ./setup.sh ${{ inputs.fedot_branch }}

      - name: Run benchmark
        run: |
          cd ${{ env.BENCHMARK_DIR }}
          python runbenchmark.py FEDOT ${{ inputs.preset }} -t ${{ inputs.constraints }}
        env:
          GITHUB_PAT: ${{ secrets.PUBLIC_ACCESS_GITHUB_PAT }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fedot-results-${{ github.run_id }}
          path: ${{ env.BENCHMARK_DIR }}/results/
          retention-days: 7
